name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            crawler-engine/package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install crawler-engine deps
        working-directory: crawler-engine
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build crawler-engine
        working-directory: crawler-engine
        run: npx tsc

      - name: Typecheck crawler-engine
        working-directory: crawler-engine
        run: npx tsc --noEmit

      - name: Typecheck backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npx vite build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install crawler-engine deps
        working-directory: crawler-engine
        run: npm ci

      - name: Run crawler-engine tests
        working-directory: crawler-engine
        run: npm test -- --run || echo "No tests yet"

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        run: npm test -- --run || echo "No tests yet"
